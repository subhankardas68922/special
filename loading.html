<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Loading</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdf6e3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #D95D39;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            user-select: none;
            opacity: 0;
            animation: fadeInPage 1s forwards;
            transition: opacity 0.8s ease-in-out;
        }

        @keyframes fadeInPage {
            to {
                opacity: 1;
            }
        }

        /* Index-style background effects */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #ffb3e6, transparent),
                radial-gradient(2px 2px at 40px 70px, #ffe066, transparent),
                radial-gradient(1px 1px at 90px 40px, #87ceeb, transparent),
                radial-gradient(1px 1px at 130px 80px, #98fb98, transparent),
                radial-gradient(1.5px 1.5px at 160px 120px, #ffb3e6, transparent),
                radial-gradient(2px 2px at 200px 50px, #ffe066, transparent);
            background-size: 250px 150px;
            animation: twinkle 4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        .grid-paper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(217, 93, 57, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 93, 57, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 2;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 20px 20px;
            }
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.98);
            }

            100% {
                opacity: 0.7;
                transform: scale(1.02);
            }
        }



        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loading-text {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #D95D39;
            text-transform: none;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.6);
            min-height: 2.5rem;
            /* Prevent layout shift when text changes */
            transition: opacity 0.15s ease-in-out;
        }

        .heart-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .loader-heart-item {
            width: 40px;
            height: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-svg {
            width: 38px;
            height: 38px;
            position: absolute;
            stroke-width: 1.2; /* Extremely thin, delicate stroke */
            stroke: #D95D39;
            overflow: visible;
        }

        .heart-border {
            fill: none;
            opacity: 0.25;
        }

        .heart-filled {
            fill: #D95D39;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 0.1s linear;
            z-index: 2;
        }

        /* Add a soft glow when filled */
        .heart-filled.completed {
            filter: drop-shadow(0 0 4px rgba(217, 93, 57, 0.5));
            animation: popHeart 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popHeart {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.25);
            }

            100% {
                transform: scale(1);
            }
        }

        .percentage {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            font-weight: 400;
            margin-top: 10px;
            color: #D95D39;
        }

        .is-active {
            animation: pulse 0.5s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 2px rgba(217, 93, 57, 0.2));
            }

            50% {
                transform: scale(1.15);
                filter: drop-shadow(0 0 8px rgba(217, 93, 57, 0.5));
            }
        }
    </style>
</head>

<body>

    <div class="stars-bg"></div>
    <div class="grid-paper"></div>

    <div class="container">
        <div class="loading-text" id="loadingText">Gathering stars... ✨</div>

        <div class="heart-bar" id="heartBar">
            <!-- Hearts injected by JS -->
        </div>

        <div class="percentage" id="percentText">0%</div>
    </div>

    <script>
        const heartBar = document.getElementById('heartBar');
        const percentText = document.getElementById('percentText');
        const loadingText = document.getElementById('loadingText');
        const totalHearts = 7;

        const duration = 1500; // 1.5 seconds total
        const frameRate = 30;
        const totalFrames = (duration / 1000) * frameRate;
        let currentFrame = 0;

        const messages = [
            { thresh: 0, text: 'Gathering stars... ✨' },
            { thresh: 40, text: 'Folding letters... 💌' },
            { thresh: 75, text: 'Preparing memories... 💖' },
            { thresh: 94, text: 'Almost there... 🎀' }
        ];

        // Initialize Hearts
        for (let i = 0; i < totalHearts; i++) {
            const heartContainer = document.createElement('div');
            heartContainer.className = 'loader-heart-item';
            // Hand-drawn, asymmetrical, imperfect heart path
            const heartPath = "M11 21.5 C11 21.5 2 13.5 4 7 C5 3 9.5 2.5 11.5 6 C11.5 6 14.5 1 19.5 4 C23 6.5 19 14 11 21.5 Z";
            heartContainer.innerHTML = `
                <svg class="heart-svg heart-border" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="${heartPath}"></path>
                </svg>
                <svg class="heart-svg heart-filled" id="fill-${i}" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="${heartPath}"></path>
                </svg>
            `;
            heartBar.appendChild(heartContainer);
        }

        let currentMsgIndex = 0;

        function animate() {
            if (currentFrame <= totalFrames) {
                // Ease Out effect for smoother loading feel (faster at start, slower at end)
                const t = currentFrame / totalFrames;
                // easeOutQuad
                const easedProgress = t * (2 - t);
                const progressMath = Math.min(Math.round(easedProgress * 100), 100);

                // Keep it going smoothly up
                const progress = progressMath;
                percentText.innerText = progress + '%';

                // Update text based on progress
                let nextMsgIndex = currentMsgIndex;
                for (let i = messages.length - 1; i >= 0; i--) {
                    if (progress >= messages[i].thresh) {
                        nextMsgIndex = i;
                        break;
                    }
                }

                if (nextMsgIndex !== currentMsgIndex) {
                    loadingText.style.opacity = 0; // Starts 150ms fade out
                    setTimeout(() => {
                        loadingText.innerText = messages[nextMsgIndex].text;
                        loadingText.style.opacity = 1; // Fades back in
                    }, 150); // Wait for the fade out to finish before swapping text
                    currentMsgIndex = nextMsgIndex;
                }

                const progressPerHeart = 100 / totalHearts;

                for (let i = 0; i < totalHearts; i++) {
                    const fillElement = document.getElementById(`fill-${i}`);
                    const heartThreshold = (i + 1) * progressPerHeart;
                    const prevThreshold = i * progressPerHeart;

                    if (progress >= heartThreshold) {
                        fillElement.style.clipPath = 'inset(0 0% 0 0)';
                        fillElement.parentElement.classList.remove('is-active');
                        if (!fillElement.classList.contains('completed')) {
                            fillElement.classList.add('completed');
                        }
                    } else if (progress > prevThreshold) {
                        const localPercent = ((progress - prevThreshold) / progressPerHeart) * 100;
                        fillElement.style.clipPath = `inset(0 ${100 - localPercent}% 0 0)`;
                        fillElement.parentElement.classList.add('is-active');
                    } else {
                        fillElement.style.clipPath = 'inset(0 100% 0 0)';
                        fillElement.parentElement.classList.remove('is-active');
                    }
                }

                currentFrame++;
                setTimeout(animate, 1000 / frameRate);
            } else {
                loadingText.style.opacity = 0;
                
                // Allow the 'Ready! 💝' text to smoothly fade in
                setTimeout(() => {
                    loadingText.innerText = 'Ready! 💝';
                    loadingText.style.opacity = 1;

                    // Pause at 100% Ready for 0.30s as requested
                    setTimeout(() => {
                        // Very smooth fade out before redirecting
                        document.body.style.transition = 'opacity 0.6s ease-in-out';
                        document.body.style.opacity = 0; 
                        
                        // Let fade complete then navigate
                        setTimeout(() => {
                            window.location.href = 'https://subhankar2407.github.io/hpybday/memory.html';
                        }, 600);
                    }, 300); // The 0.30 sec wait
                }, 150);
            }
        }

        window.onload = () => {
            setTimeout(animate, 300); // slight delay before starting to let page fade in
        };
    </script>
</body>

</html>
