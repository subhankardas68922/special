<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;700&family=Shrikhand&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #fdf6e3;
            --accent-primary: #D95D39;
            --accent-secondary: #EE964B;
            --text-main: #4a5568;
            --paper-color: #ffffff;
        }

        /* ----- PREMIUM HEART SEQUENCE LOADER ----- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fdf6e3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-grid-paper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(217, 93, 57, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 93, 57, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 2;
            animation: moveGrid 20s linear infinite;
        }
        
        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }

        .loader-container {
            text-align: center;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loading-text {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #D95D39;
            text-transform: none;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.6);
            min-height: 2.5rem;
            transition: opacity 0.15s ease-in-out;
        }

        .heart-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .loader-heart-item {
            width: 38px;
            height: 38px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-svg {
            width: 38px;
            height: 38px;
            position: absolute;
            stroke-width: 1.2;
            stroke: #D95D39;
            overflow: visible;
        }

        .heart-border {
            fill: none;
            opacity: 0.25;
        }

        .heart-filled {
            fill: #D95D39;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 0.1s linear;
            z-index: 2;
        }

        .heart-filled.completed {
            filter: drop-shadow(0 0 4px rgba(217, 93, 57, 0.5));
            animation: popHeart 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popHeart {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .percentage {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            font-weight: 400;
            margin-top: 10px;
            color: #D95D39;
        }

        .is-active {
            animation: pulse 0.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(217, 93, 57, 0.2)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 8px rgba(217, 93, 57, 0.5)); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #fdf6e3;
        }

        ::-webkit-scrollbar-thumb {
            background: #EE964B;
            border-radius: 10px;
            border: 2px solid #fdf6e3;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D95D39;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }

        /* Reusing backgrounds from lobby.html */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #ffb3e6, transparent),
                radial-gradient(2px 2px at 40px 70px, #ffe066, transparent),
                radial-gradient(1px 1px at 90px 40px, #87ceeb, transparent),
                radial-gradient(1px 1px at 130px 80px, #98fb98, transparent),
                radial-gradient(2px 2px at 160px 30px, #ffb3e6, transparent);
            background-size: 200px 100px;
            animation: twinkle 3s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        .grid-paper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 182, 193, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 182, 193, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        .page-container {
            position: relative;
            z-index: 10;
            padding: 1.5rem 1rem 4rem 1rem;
            width: 100%;
            max-width: 480px; /* Aligned with lobby.html */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
            width: 100%;
        }

        .hand-text {
            display: block;
            color: var(--accent-secondary);
            font-family: 'Caveat', cursive;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            transform: rotate(-2deg);
            margin-bottom: 0.25rem;
        }

        .main-title {
            font-family: 'Shrikhand', cursive;
            color: var(--accent-primary);
            font-size: clamp(2rem, 8vw, 3rem);
            line-height: 1.1;
            margin-bottom: 0.5rem;
            word-wrap: break-word; /* Prevent overflow on very narrow screens */
        }

        /* Navigation Buttons - Paper Strip Style */
        .emotion-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            width: 100%;
        }

        .emotion-button {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.85rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.75rem;
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(217, 93, 57, 0.15);
            transition: all 0.2s ease;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .emotion-button:hover {
            transform: translateX(4px) rotate(0.5deg);
            background: #ffffff;
            box-shadow: 5px 5px 0px 0px rgba(217, 93, 57, 0.1);
        }

        .emotion-button:active {
            transform: scale(0.97) translateX(2px);
        }

        .emotion-button:nth-child(even) { transform: rotate(-0.5deg); }
        .emotion-button:nth-child(odd) { transform: rotate(0.5deg); }

        .icon-box {
            background: #fff9c4;
            color: var(--accent-primary);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .item-label {
            font-family: 'Caveat', cursive;
            font-size: clamp(1.2rem, 4.5vw, 1.5rem);
            font-weight: 700;
            color: #444;
            line-height:1.2;
            /* ALLOW WRAPPING */
        }

        /* Message List Styling */
        .message-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            width: 100%;
        }

        /* Make it 3 columns on slightly wider "mobile" screens */
        @media (min-width: 400px) {
            .message-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .envelope-button {
            background: rgba(255, 255, 255, 0.85);
            border: 1px dashed var(--accent-secondary);
            border-radius: 12px;
            padding: 1rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.05);
        }

        .envelope-button:hover {
            transform: translateY(-3px) rotate(-1deg);
            background: #fff;
            box-shadow: 4px 4px 0px 0px rgba(238, 150, 75, 0.1);
        }

        .envelope-button span:first-child {
            font-size: 2rem !important; /* Smaller emoji for smaller screens */
        }

        .envelope-button .num-label {
            font-family: 'Shrikhand', cursive;
            color: var(--accent-primary);
            font-size: 0.9rem;
        }

        /* Letter Styling */
        .letter-container {
            background: #fff;
            padding: 2rem 1.25rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);

            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            background-image: repeating-linear-gradient(transparent, transparent 31px, #f0f0f0 31px, #f0f0f0 32px);

            font-family: 'Caveat', cursive;
            font-size: clamp(1.3rem, 5vw, 1.6rem);

            white-space: pre-line;
            padding-top: 5px;

            width: 100%;
            max-width: 280px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .cta-button {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.7rem 1.25rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(217, 93, 57, 0.3);
            font-size: 0.95rem;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(217, 93, 57, 0.4);
            filter: brightness(1.1);
        }

        .cta-button.secondary {
            background: white;
            color: var(--accent-primary);
            border: 1px solid rgba(217, 93, 57, 0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);

        .back-nav {
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            padding: 6px 10px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 0.8rem;
            z-index: 100;
        }

        /* Hearts animation */
        .heart {
            position: fixed;
            top: -5vh;
            color: rgba(217, 93, 57, 0.15);
            pointer-events: none;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        footer {
            margin-top: 2rem;
            font-family: 'Caveat', cursive;
            color: #9ca3af;
            font-size: 1.1rem;
            text-align: center;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(40px);
            z-index: 1;
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>

        const emojis = {
            'sad': '🥺',
            'happy': '🥰',
            'angry': '😤',
            'overthinking': '🌀',
            'you miss me': '🫂'
        };

        const mainView = document.getElementById('main-view');
        const emotionList = document.getElementById('emotion-list');
        const messagesView = document.getElementById('messages-view');
        const emotionTitle = document.getElementById('emotion-title');
        const messagesContainer = document.getElementById('messages-container');
        const letterView = document.getElementById('letter-view');
        const letterTitle = document.getElementById('letter-title');
        const letterImage = document.getElementById('letter-image');
        const letterContent = document.getElementById('letter-content');
        const backToMain = document.getElementById('back-to-main');
        const closeLetterButton = document.getElementById('close-letter');
        const nextMessageButton = document.getElementById('next-message');

        let currentEmotion = null;
        let currentMessageIndex = 0;

        function renderEmotionButtons() {
            emotionList.innerHTML = Object.keys(messagesData).map(emotion => {
                const capitalizedEmotion = emotion.charAt(0).toUpperCase() + emotion.slice(1);
                return `
                    <button class="emotion-button" data-emotion="${emotion}">
                        <div class="icon-box">
                            <span>${emojis[emotion] || '❤️'}</span>
                        </div>
                        <span class="item-label">When you're ${capitalizedEmotion}</span>
                    </button>
                `;
            }).join('');
        }

        function renderMessages(emotion) {
            currentEmotion = emotion;
            const capitalizedEmotion = emotion.charAt(0).toUpperCase() + emotion.slice(1);
            emotionTitle.innerText = capitalizedEmotion;
            
            messagesContainer.innerHTML = messagesData[emotion].map((_, index) => `
                <div class="envelope-button" onclick="openLetter('${emotion}', ${index})">
                    <span style="font-size: 2.5rem;">💌</span>
                    <span class="num-label">Letter #${index + 1}</span>
                </div>
            `).join('');
        }

        window.openLetter = function (emotion, index) {
            currentMessageIndex = index;
            const message = messagesData[emotion][index];
            letterTitle.innerText = `Letter #${index + 1}`;
            letterImage.src = message.image;
            letterContent.innerText = message.text;
            messagesView.classList.add('hidden');
            letterView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        emotionList.addEventListener('click', (e) => {
            const btn = e.target.closest('.emotion-button');
            if (btn) {
                const emotion = btn.dataset.emotion;
                mainView.classList.add('hidden');
                messagesView.classList.remove('hidden');
                renderMessages(emotion);
            }
        });

        backToMain.addEventListener('click', (e) => {
            e.preventDefault();
            messagesView.classList.add('hidden');
            mainView.classList.remove('hidden');
        });

        closeLetterButton.addEventListener('click', () => {
            letterView.classList.add('hidden');
            messagesView.classList.remove('hidden');
        });

        nextMessageButton.addEventListener('click', () => {
            currentMessageIndex = (currentMessageIndex + 1) % messagesData[currentEmotion].length;
            openLetter(currentEmotion, currentMessageIndex);
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 8 + 12) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.opacity = Math.random() * 0.4 + 0.1;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 1200);

        document.addEventListener('DOMContentLoaded', renderEmotionButtons);

        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            const heartBar = document.getElementById('heartBar');
            const percentText = document.getElementById('percentText');
            const loadingText = document.getElementById('loadingText');
            const totalHearts = 7;
            const duration = 1500;
            const frameRate = 30;
            const totalFrames = (duration / 1000) * frameRate;
            let currentFrame = 0;

            const messages = [
                { thresh: 0, text: 'Gathering stars... ✨' },
                { thresh: 40, text: 'Folding letters... 💌' },
                { thresh: 75, text: 'Preparing memories... 💖' },
                { thresh: 94, text: 'Almost there... 🎀' }
            ];

            const heartPath = "M11 21.5 C11 21.5 2 13.5 4 7 C5 3 9.5 2.5 11.5 6 C11.5 6 14.5 1 19.5 4 C23 6.5 19 14 11 21.5 Z";
            
            for (let i = 0; i < totalHearts; i++) {
                const heartContainer = document.createElement('div');
                heartContainer.className = 'loader-heart-item';
                heartContainer.innerHTML = `
                    <svg class="heart-svg heart-border" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="${heartPath}"></path>
                    </svg>
                    <svg class="heart-svg heart-filled" id="fill-${i}" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="${heartPath}"></path>
                    </svg>
                `;
                heartBar.appendChild(heartContainer);
            }

            let currentMsgIndex = 0;

            function animateLoading() {
                if (currentFrame <= totalFrames) {
                    const t = currentFrame / totalFrames;
                    const easedProgress = t * (2 - t);
                    const progressMath = Math.min(Math.round(easedProgress * 100), 100);
                    const progress = progressMath;
                    percentText.innerText = progress + '%';

                    let nextMsgIndex = currentMsgIndex;
                    for (let i = messages.length - 1; i >= 0; i--) {
                        if (progress >= messages[i].thresh) {
                            nextMsgIndex = i;
                            break;
                        }
                    }

                    if (nextMsgIndex !== currentMsgIndex) {
                        loadingText.style.opacity = 0;
                        setTimeout(() => {
                            loadingText.innerText = messages[nextMsgIndex].text;
                            loadingText.style.opacity = 1;
                        }, 150);
                        currentMsgIndex = nextMsgIndex;
                    }

                    const progressPerHeart = 100 / totalHearts;

                    for (let i = 0; i < totalHearts; i++) {
                        const fillElement = document.getElementById(`fill-${i}`);
                        const heartThreshold = (i + 1) * progressPerHeart;
                        const prevThreshold = i * progressPerHeart;

                        if (progress >= heartThreshold) {
                            fillElement.style.clipPath = 'inset(0 0% 0 0)';
                            fillElement.parentElement.classList.remove('is-active');
                            if (!fillElement.classList.contains('completed')) {
                                fillElement.classList.add('completed');
                            }
                        } else if (progress > prevThreshold) {
                            const localPercent = ((progress - prevThreshold) / progressPerHeart) * 100;
                            fillElement.style.clipPath = `inset(0 ${100 - localPercent}% 0 0)`;
                            fillElement.parentElement.classList.add('is-active');
                        } else {
                            fillElement.style.clipPath = 'inset(0 100% 0 0)';
                            fillElement.parentElement.classList.remove('is-active');
                        }
                    }

                    currentFrame++;
                    setTimeout(animateLoading, 1000 / frameRate);
                } else {
                    loadingText.style.opacity = 0;
                    setTimeout(() => {
                        loadingText.innerText = 'Ready! 💝';
                        loadingText.style.opacity = 1;
                        setTimeout(() => {
                            loader.style.transition = 'opacity 0.6s ease-in-out';
                            loader.style.opacity = 0;
                            setTimeout(() => {
                                loader.style.display = 'none';
                            }, 600);
                        }, 300);
                    }, 150);
                }
            }
            setTimeout(animateLoading, 300);
        });
    </script>
